<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Transición 3D Pura</title>
    <style>
        .btn-interactivo {
            border-style: outset;
            border-width: 6px;
            padding: 12px 24px;
            cursor: pointer;
        }
        .btn-interactivo:hover {
            border-style: inset;
        }
    </style>
</head>
<body>
    <button class="btn-interactivo">
        Botón Interactivo
    </button>
</body>
</html>
