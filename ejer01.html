<!DOCTYPE html>
<html lang="es-PE">
<head>
<title>Diferenciación de Bloques e Inline</title>
<style>
.caja-bloque { border: 2px solid red; background-color: #FFF4A3; } /*
Elemento Bloque */
.texto-inline { border: 1px dashed blue; font-weight: bold; } /* Elemento
Inline */
</style>
</head>
<body>
<div class="caja-bloque">Esto es un contenedor div (ocupa todo el
ancho).</div>
<p>Texto normal donde <span class="texto-inline">este fragmento span</span>
está en línea.</p>
</body>
</html>
