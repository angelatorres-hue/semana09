<!DOCTYPE html>
<html lang="es-PE">
<head>
<meta charset="UTF-8">
<title>Proyecto 1 - Ficha de Producto</title>
<style>
.tarjeta-producto {
width: 320px; /* Dimensión de bloque definida */
margin: 40px auto; /* Centrado horizontal automático en pantalla */
border-style: double; /* Estilo de borde doble especificado en el silabo */
border-width: 5px;
border-color: #2c3e50;
padding: 20px; /* Separación para que el contenido respire */
background-color: #ffffff;
font-family: Arial, sans-serif;
}
.tarjeta-producto h2 {
margin-top: 0px;
color: #2c3e50;
}
.precio-resaltado {
background-color: #FFF4A3; /* Color de fondo destacado del laboratorio */
padding: 4px 8px; /* Pequeño colchón interno inline */
font-weight: bold;
color: #d35400;
}
</style>
</head>
<body>
<div class="tarjeta-producto">
<h2>Laptop Gamer Pro</h2>
<p>Dispositivo de alta gama ideal para desarrollo de sistemas y modelado en
tres dimensiones.</p>
<p>Precio especial: <span class="precio-resaltado">S/. 4,500.00</span></p>
</div>
</body>
</html>
