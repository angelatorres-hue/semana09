<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Impacto del Padding</title>
    <link rel="stylesheet" href="ejer04.css">
</head>
<body>

    <div class="caja-sin-padding">
        Texto sin padding. Los caracteres chocan agresivamente contra el borde, reduciendo la legibilidad.
    </div>

    <div class="caja-con-padding">
        Texto con padding. El relleno genera un espacio interno que protege al texto y mejora la lectura.
    </div>

</body>
</html>
